services:
  db:
    image: postgres:18
    container_name: mba_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql
      - ./create.sql:/docker-entrypoint-initdb.d/create.sql:ro
    ports:
      - "5432:5432"

volumes:
  pgdata:
